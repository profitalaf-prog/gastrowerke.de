<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmelden – gastrowerke</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.login-wrap{min-height:calc(100vh - 200px);display:flex;align-items:center;justify-content:center;padding:48px 20px}
.login-box{max-width:480px;width:100%}
.login-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:32px}
.login-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border)}
.login-tab{flex:1;padding:12px;text-align:center;background:none;border:none;font-weight:600;cursor:pointer}
.login-tab.active{color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px}
.login-panel{display:none}
.login-panel.active{display:block}
.error-banner{display:none;background:#fde8e8;padding:12px;border-radius:var(--radius);margin-bottom:16px;color:#c0392b}
.success-banner{display:none;background:#d4f5ec;padding:12px;border-radius:var(--radius);margin-bottom:16px;color:#1a6b56}
</style>
</head>
<body>
<div id="gw-header-root"></div>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab('login')">Anmelden</button>
        <button class="login-tab" onclick="switchTab('reg')">Konto erstellen</button>
      </div>
      <div id="panelLogin" class="login-panel active">
        <div class="error-banner" id="loginError"></div>
        <form id="loginForm">
          <div class="form-group"><label>E-Mail</label><input type="email" id="loginEmail" class="form-control" required></div>
          <div class="form-group"><label>Passwort</label><input type="password" id="loginPw" class="form-control" required></div>
          <button type="submit" class="btn-primary" style="width:100%;justify-content:center">Anmelden</button>
          <div style="text-align:center;margin-top:16px"><a href="reset-passwort.html">Passwort vergessen?</a></div>
        </form>
      </div>
      <div id="panelReg" class="login-panel">
        <div class="error-banner" id="regError"></div>
        <div class="success-banner" id="regSuccess"></div>
        <form id="regForm">
          <div class="form-group"><label>Vollständiger Name</label><input type="text" id="regName" class="form-control" required></div>
          <div class="form-group"><label>E-Mail</label><input type="email" id="regEmail" class="form-control" required></div>
          <div class="form-group"><label>Passwort (mind. 8 Zeichen)</label><input type="password" id="regPw" class="form-control" required></div>
          <div class="form-group"><label>Passwort bestätigen</label><input type="password" id="regPw2" class="form-control" required></div>
          <div class="form-check"><input type="checkbox" id="regTerms"> <label>Ich akzeptiere die <a href="agb.html">AGB</a> und <a href="datenschutz.html">Datenschutzerklärung</a>.</label></div>
          <button type="submit" class="btn-primary" style="width:100%;justify-content:center">Registrieren</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div id="gw-footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="layout.js"></script>
<script src="pages-common.js"></script>
<script>
function switchTab(tab){
  document.getElementById('panelLogin').classList.toggle('active',tab==='login');
  document.getElementById('panelReg').classList.toggle('active',tab==='reg');
  document.querySelectorAll('.login-tab').forEach(btn=>btn.classList.remove('active'));
  document.querySelector(`.login-tab[onclick="switchTab('${tab}')"]`).classList.add('active');
}
document.getElementById('loginForm').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  const result=await window.gwAuth.loginUser(email,pw);
  if(result.ok) window.location.href='konto.html';
  else {document.getElementById('loginError').textContent=result.msg;document.getElementById('loginError').style.display='block';}
});
document.getElementById('regForm').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pw=document.getElementById('regPw').value;
  const pw2=document.getElementById('regPw2').value;
  const terms=document.getElementById('regTerms').checked;
  if(pw!==pw2){alert('Passwörter stimmen nicht überein');return;}
  if(!terms){alert('Bitte AGB akzeptieren');return;}
  const result=await window.gwAuth.registerUser(name,email,pw);
  if(result.ok) window.location.href='konto.html';
  else {document.getElementById('regError').textContent=result.msg;document.getElementById('regError').style.display='block';}
});
</script>
</body>
</html>
