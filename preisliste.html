<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preisliste – gastrowerke</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div id="gw-header-root"></div>

<div class="page-hero">
  <div class="container">
    <nav class="breadcrumb"><a href="index.html">Start</a><span>›</span><span>Preisliste</span></nav>
    <h1 class="page-hero-title">Unsere <em>Preisliste</em></h1>
  </div>
</div>

<div class="container" style="padding:32px 0 80px">
  <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden">
      <thead><tr style="background:var(--primary);color:white"><th>Produkt</th><th>Kategorie</th><th>Preis (brutto)</th></tr></thead>
      <tbody id="priceTableBody"><tr><td colspan="3">Laden...</td></tr></tbody>
    </table>
  </div>
</div>

<div id="gw-footer-root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="layout.js"></script>
<script src="pages-common.js"></script>
<script>
fetch('products.json').then(r=>r.json()).then(products=>{
  const tbody=document.getElementById('priceTableBody');
  tbody.innerHTML=products.slice(0,50).map(p=>`<tr><td>${p.name}</td><td>${p.category}</td><td>${formatPrice(p.price)}</td></tr>`).join('');
});
</script>
</body>
</html>
