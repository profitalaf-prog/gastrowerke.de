<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt – gastrowerke</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div id="gw-header-root"></div>

<div class="page-hero">
  <div class="container">
    <nav class="breadcrumb"><a href="index.html">Start</a><span>›</span><span>Kontakt</span></nav>
    <h1 class="page-hero-title">Kontakt <em>aufnehmen</em></h1>
  </div>
</div>

<div class="container">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:48px;padding:48px 0 80px">
    <div>
      <form id="contactForm">
        <div class="form-group"><label>Name *</label><input type="text" id="cName" class="form-control" required></div>
        <div class="form-group"><label>E-Mail *</label><input type="email" id="cEmail" class="form-control" required></div>
        <div class="form-group"><label>Betreff</label><select id="cSubject"><option>Allgemeine Anfrage</option><option>Bestellung</option><option>Reklamation</option></select></div>
        <div class="form-group"><label>Nachricht *</label><textarea id="cMessage" rows="5" class="form-control" required></textarea></div>
        <div class="form-check"><input type="checkbox" id="cPrivacy"> <label>Ich habe die <a href="datenschutz.html">Datenschutzerklärung</a> gelesen.</label></div>
        <button type="submit" class="btn-primary">Nachricht senden</button>
      </form>
      <div id="contactSuccess" style="display:none;padding:40px;text-align:center;background:var(--bg-alt);border-radius:var(--radius-lg);margin-top:20px">
        <h3>Nachricht gesendet</h3>
        <p>Wir melden uns innerhalb von 24 Stunden.</p>
      </div>
    </div>
    <div>
      <div style="background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:28px">
        <h3>gastrowerke GmbH</h3>
        <p>Industriestraße 14<br>67655 Kaiserslautern</p>
        <p>Telefon: +49 (0) 631 123 45 67<br>E-Mail: info@gastrowerke.de</p>
        <p>Mo–Fr: 8:00 – 17:00 Uhr</p>
      </div>
    </div>
  </div>
</div>

<div id="gw-footer-root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="layout.js"></script>
<script src="pages-common.js"></script>
<script src="contact.js"></script>
</body>
</html>
